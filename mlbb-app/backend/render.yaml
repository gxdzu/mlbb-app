services:
  - type: web
    name: mlbb-predictions-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
